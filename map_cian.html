<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Избранные квартиры Циан — Санкт-Петербург</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.7.1/dist/leaflet.css">
    <link rel="stylesheet" href="./css/base.css">
    <link rel="stylesheet" href="./css/cards.css">
    <link rel="stylesheet" href="./css/rating.css">
    <link rel="stylesheet" href="./css/sort.css">
    <link rel="stylesheet" href="./css/markers.css">
    <link rel="stylesheet" href="./css/gallery.css">
</head>
<body>
    <div id="map"></div>
    <div id="list">
        <div class="list-top-row">
            <div class="list-search-header">
                <label class="list-search-label">Быстрый поиск по тексту карточки</label>
                <div class="list-search-row">
                    <input type="text" id="list-search-input" class="list-search-input" placeholder="Адрес, метро, цена...">
                    <button type="button" id="list-search-clear" class="list-search-clear" title="Очистить">✕</button>
                </div>
            </div>
            <div class="sort-controls">
                <label for="list-sort-select" class="sort-label">Сортировка:</label>
                <select id="list-sort-select" class="sort-select">
                <optgroup label="Рейтинг">
                    <option value="rating-desc">По рейтингу (лучшие сверху)</option>
                    <option value="rating-asc">По рейтингу (худшие сверху)</option>
                </optgroup>
                <optgroup label="Цена">
                    <option value="price-asc">По цене (дешевле сначала)</option>
                    <option value="price-desc">По цене (дороже сначала)</option>
                </optgroup>
                <optgroup label="Цена за м²">
                    <option value="price_per_sqm-asc">По цене за м² (дешевле)</option>
                    <option value="price_per_sqm-desc">По цене за м² (дороже)</option>
                </optgroup>
                <optgroup label="Площадь">
                    <option value="area-asc">По площади (меньше сначала)</option>
                    <option value="area-desc">По площади (больше сначала)</option>
                </optgroup>
                <optgroup label="Этаж">
                    <option value="floor-asc">По этажу (ниже сначала)</option>
                    <option value="floor-desc">По этажу (выше сначала)</option>
                </optgroup>
                <optgroup label="Год">
                    <option value="build_year-asc">По году (старые сначала)</option>
                    <option value="build_year-desc">По году (новые сначала)</option>
                </optgroup>
                <optgroup label="Комнаты">
                    <option value="rooms-asc">По кол-ву комнат (меньше сначала)</option>
                    <option value="rooms-desc">По кол-ву комнат (больше сначала)</option>
                </optgroup>
            </select>
        </div>
        </div>
        <div class="list-cards" id="list-cards"></div>
    </div>

    <div id="gallery-modal">
        <div class="modal-header">
            <span class="modal-title" id="gallery-title"></span>
            <button class="modal-close" id="gallery-close">Закрыть</button>
        </div>
        <div class="modal-body">
            <div id="gallery-slider-wrap">
                <div id="gallery-slider">
                    <div class="slider-img-wrap"><img id="gallery-img" src="" alt=""></div>
                    <div class="slider-nav">
                        <button type="button" id="gallery-prev">← Назад</button>
                        <span class="slider-counter" id="gallery-counter">1 / 1</span>
                        <button type="button" id="gallery-next">Вперёд →</button>
                    </div>
                </div>
            </div>
            <div class="modal-sidebar">
                <div class="modal-description" id="gallery-description"></div>
                <a id="gallery-link" class="modal-link" href="#" target="_blank">Открыть на Циан</a>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.7.1/dist/leaflet.js"></script>
    <script src="./data/apartments.js"></script>
    <script src="./data/hidden_ids.js"></script>
    <script src="./data/metro_spb.js"></script>
    <script src="./js/rating.js"></script>
    <script src="./js/gallery.js"></script>
    <script src="./js/map.js"></script>
    <script src="./js/list.js"></script>
    <script>
        (function () {
            var full = window.APARTMENTS || [];
            var hiddenIds = window.APARTMENT_HIDDEN_IDS || [];
            function getId(a) { var m = (a.url || '').match(/\/(\d+)\/?$/); return m ? m[1] : ''; }
            window.APARTMENTS = full.filter(function (a) { return hiddenIds.indexOf(getId(a)) === -1; });
            initMap(window.APARTMENTS);
            initGallery();
            initList();
        })();
    </script>
</body>
</html>
